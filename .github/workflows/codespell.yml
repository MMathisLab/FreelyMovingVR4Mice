---
name: Codespell

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Codespell
        uses: codespell-project/actions-codespell@v1
        with:
          ignore_words_list: ignore_words.txt
          skip: './mouse_task/visual_discrim_unity_build/*,./teensyexp/teensy.py,./mouse_task/unity_ar/MonoBleedingEdge/etc/mono/browscap.ini,./mouse_task/latency_tests/*'
