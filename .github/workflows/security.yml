name: Security checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notebooks:
    name: Notebook outputs (nbstripout)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Verify notebooks have no committed outputs
        run: |
          pip install nbstripout
          mapfile -t notebooks < <(find dj_pipeline mouse_task -name '*.ipynb' 2>/dev/null | sort)
          if [ "${#notebooks[@]}" -eq 0 ]; then
            echo "No notebooks found."
            exit 0
          fi
          nbstripout --verify "${notebooks[@]}"

  forbidden-files:
    name: Blocklisted tracked files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if secrets or personal configs are tracked
        run: |
          set -euo pipefail
          blocked="$(git ls-files | grep -E '(^|/)\.env(\.compose|\.aws)?$|(^|/)local_config\.json$|\.env(\.compose)?\.bak$' || true)"
          if [ -n "${blocked}" ]; then
            echo "These files must not be tracked (use .env.example, .env.compose.example, .env-aws.example, local_config.json.example):"
            echo "${blocked}"
            exit 1
          fi
          echo "No blocklisted credential files tracked."

  infra-patterns:
    name: Internal host patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block known internal hosts in tracked files
        run: |
          set -euo pipefail
          patterns='128\.178\.51\.167|vr4mice-ar-collab\.cluster'
          matches="$(git grep -E "${patterns}" -- $(git ls-files) || true)"
          if [ -n "${matches}" ]; then
            echo "Possible infrastructure leak in tracked files:"
            echo "${matches}"
            exit 1
          fi
          echo "No blocklisted host patterns in tracked files."
