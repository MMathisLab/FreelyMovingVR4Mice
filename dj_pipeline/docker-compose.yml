version: "2.4"
services:
  db:
    image: mysql:8.0
    command: --character-set-server=latin1 --collation-server=latin1_swedish_ci
    container_name: ${DB_CONTAINER_NAME:-vr4mice_db}
    ports:
      - "${DB_BIND_IP:-0.0.0.0}:${DB_PORT:-3309}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-simple}
    volumes:
      - ${DB_DATA_PATH:-/mnt/database/vr4mice/vr4mice_database/database/}:/var/lib/mysql
  client:
    image: ${CLIENT_IMAGE:-mmathislab/vr4mice_app:0.1.0}
    container_name: ${CLIENT_CONTAINER_NAME:-vr4mice_${USER}}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - USERNAME=${USER_NAME}
      - HOME=/home/${USER_NAME}
      - PIP_CACHE_DIR=/home/${USER_NAME}/.cache/pip
      - PATH=/home/${USER_NAME}/.local/bin:$PATH
      - TAG=${TAG}
    network_mode: ${CLIENT_NETWORK_MODE:-host}
    volumes:
      - "./:/app"
      - "${SHARED_PATH:-/mnt/database/shared}:/shared"
      - "${DATA_PATH:-/mnt/database/vr4mice/vr4mice_database/data}:/data"
      - "${SCREEN_RECORDINGS_PATH:-/mnt/neuropixel_data/vr4mice/raw_screen_recordings}:/vr4mice_screen_recordings"
      - "./base/base_min_schemas:/base_schemas"
      - "./base/base_actions:/base_actions"
    ports: 
      - "${JUPYTER_PORT:-8887}:8888"
    working_dir: /app
    env_file:
      - .env
    stdin_open: true
    tty: true
