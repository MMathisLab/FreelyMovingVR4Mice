services:
  db:
    image: ${DB_IMAGE:-mysql:8.0}
    command: --character-set-server=latin1 --collation-server=latin1_swedish_ci
    container_name: ${DB_CONTAINER_NAME:-vr4mice_db}
    ports:
      - "${DB_BIND_IP:-0.0.0.0}:${DB_PORT:-3309}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-simple}
    volumes:
      - ${DB_DATA_PATH:-/mnt/database/vr4mice/vr4mice_database/database/}:/var/lib/mysql
  client:
    image: ${CLIENT_IMAGE:-mmathislab/vr4mice_app:0.1.0}
    container_name: ${CLIENT_CONTAINER_NAME:-vr4mice_${USER}}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - USERNAME=${USER_NAME}
      - HOME=/app
        #- PYTHONUSERBASE=/app/.local
        #- PIP_CACHE_DIR=/app/.cache/pip
      - MPLCONFIGDIR=/app/.cache/matplotlib
      - XDG_CONFIG_HOME=/app/.cache
      - PATH=/app/.local/bin:/usr/local/bin:/usr/bin:/bin
      - TAG=${TAG}
    network_mode: ${CLIENT_NETWORK_MODE:-host}
    # Run via bash so the bind-mounted script does not need +x on shared/NFS checkouts.
    entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint.sh"]
    volumes:
      - "./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro"
      - "./docker/ensure_python_shims.sh:/usr/local/bin/ensure_python_shims.sh:ro"
      - "./:/app"
      - "${SHARED_PATH:-/mnt/database/shared}:/shared"
      - "${DATA_PATH:-/mnt/database/vr4mice/vr4mice_database/data}:/data"
      - "${SCREEN_RECORDINGS_PATH:-/mnt/neuropixel_data/vr4mice/raw_screen_recordings}:/vr4mice_screen_recordings"
      - "./base/base_min_schemas:/base_schemas"
      - "./base/base_actions:/base_actions"
    ports: 
      - "${JUPYTER_PORT:-8887}:8888"
    working_dir: /app
    env_file:
      - .env
    stdin_open: true
    tty: true
    # Keep the client alive under `docker compose up -d` (plain bash may exit without a TTY).
    command: ["sleep", "infinity"]
