title: FreelyMovingVR4Mice
author: MWMathis Lab
logo: docs/images/logo.png
only_build_toc_files: true

sphinx:
  config:
    autodoc_mock_imports: "list"
    html_static_path:
      - docs/_static
    html_css_files:
      - custom.css
    html_js_files:
      - custom-header-icons.js
    html_theme_options:
      icon_links:
        - name: GitHub
          url: https://github.com/MMathisLab/FreelyMovingVR4Mice
          icon: fa-brands fa-github
          type: fontawesome
        - name: Paper
          url: https://www.cell.com/current-biology/fulltext/S0960-9822(26)00722-0?
          icon: fa-solid fa-file-lines
          type: fontawesome
  extra_extensions:
    - numpydoc

execute:
  execute_notebooks: "off"

html:
  favicon: "docs/images/logo.png"
  extra_navbar: ""
  use_issues_button: true
  use_repository_button: true
  downloads: ["notebook"]
  extra_footer: |
    <div>Powered by <a href="https://jupyterbook.org/">Jupyter Book</a>.</div>

repository:
  url: https://github.com/MMathisLab/FreelyMovingVR4Mice
  path_to_book: docs
  branch: main

launch_buttons:
  colab_url: "https://colab.research.google.com/github/MMathisLab/FreelyMovingVR4Mice/examples/yourdemo.ipynb"
