class_name: ShapeDiscrimNarrowOccluders
description: |
  Shape discrimination task, with occluders of different sizes
  Mouse must report the white pacman location and ignore the teardrop.

# Only the parameters that differ from configs/common.yaml.
params:
  session_label:
  - ar_shape_discrim_narrow_occluders
  epoch_labels:
  - pacman_vs_teardrop
  slit_size:
  - 5.0
  - 15.0
  - 2
  slit_depth: 0.02
  target_selection: 13.0
  distractor_selection: 6.0
  occlusion_type: 1.0
  target_spread: 3.0
  target_rotation: 15.0
  velocity_threshold: 5.0
  target_distance: 4.0
