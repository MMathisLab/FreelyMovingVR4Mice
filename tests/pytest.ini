[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts = -v --tb=short

# Markers (auto-applied by conftest.py based on fixture usage)
markers =
    unit: Unit tests (fast, no database, no real files - uses synthetic mock data)
    integration: Integration tests (require database and/or real golden dataset files)
    slow: Full pipeline / golden-dataset tests (skipped on PR CI; run with pytest -m slow)
    requires_db: Tests that require database connection

# Ignore patterns
norecursedirs = __pycache__ .git venv

# Logging
log_cli = false
log_cli_level = INFO
