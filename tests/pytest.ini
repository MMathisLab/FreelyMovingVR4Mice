[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts = -v --tb=short

# Markers
markers =
    unit: Unit tests (fast, no database)
    integration: Integration tests (may require database)
    slow: Tests that take a long time to run
    requires_db: Tests that require database connection

# Ignore patterns
norecursedirs = __pycache__ .git venv

# Logging
log_cli = false
log_cli_level = INFO
